services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mes-network

  # 로컬 테스트용 FastAPI mock (나중에 실제 백엔드 레포로 교체)
  backend:
    image: python:3.11-alpine
    working_dir: /app
    volumes:
      - ./mock_backend:/app
    command: >
      sh -c "pip install fastapi uvicorn --quiet &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    networks:
      - mes-network

networks:
  mes-network:
    driver: bridge
